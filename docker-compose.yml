name: "rate-limiter-complete"

# Docker Compose reads .env in this directory automatically.
# Copy .env.example → .env before running `docker compose up`.

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    container_name: redis-rl
    image: redis:alpine
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Rate Limiter ──────────────────────────────────────────────────────────
  rate-limiter:
    container_name: rate-limiter-svc
    build:
      context: ./rate-limiter
      dockerfile: Dockerfile
    ports:
      - "${RATE_LIMITER_PORT:-4000}:4000"
    environment:
      - PORT=4000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Internal Docker network URLs — services talk to each other by container name
      - SERVER_1_URL=http://server-1:${SERVER_1_PORT:-5001}
      - SERVER_1_NAME=${SERVER_1_NAME:-Server-1}
      - SERVER_2_URL=http://server-2:${SERVER_2_PORT:-5002}
      - SERVER_2_NAME=${SERVER_2_NAME:-Server-2}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend Server 1 ──────────────────────────────────────────────────────
  server-1:
    container_name: backend-server-1
    build:
      context: ./server-1
      dockerfile: Dockerfile
    ports:
      - "${SERVER_1_PORT:-5001}:5001"
    environment:
      - PORT=5001
      - SERVER_NAME=${SERVER_1_NAME:-Server-1}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend Server 2 ──────────────────────────────────────────────────────
  server-2:
    container_name: backend-server-2
    build:
      context: ./server-2
      dockerfile: Dockerfile
    ports:
      - "${SERVER_2_PORT:-5002}:5002"
    environment:
      - PORT=5002
      - SERVER_NAME=${SERVER_2_NAME:-Server-2}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend (React + Vite → nginx) ──────────────────────────────────────
  frontend:
    container_name: rl-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      # nginx.conf uses this to proxy /request /burst /reset /health
      # Uses Docker internal network — do NOT change to localhost
      - RATE_LIMITER_URL=http://rate-limiter:4000
    depends_on:
      - rate-limiter
    restart: unless-stopped

volumes:
  redis-data:

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so nginx re-resolves hostnames
    # dynamically instead of caching at startup. This is critical on Railway
    # (and any cloud platform) where services can get new IPs after redeployment.
    # ipv6=off avoids issues with Railway's IPv6 internal addresses.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy API calls to the rate-limiter service.
    # RATE_LIMITER_URL is injected at container start via envsubst.
    # Using a variable ($upstream) instead of a literal URL forces nginx
    # to use the resolver above — without this, nginx ignores the resolver.
    location ~ ^/(request|burst|reset|health) {
        set $upstream ${RATE_LIMITER_URL};

        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Fail fast — don't let the browser hang for 35+ seconds
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    15s;
    }

    # Serve React app — all unknown paths fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the rate-limiter service (internal Docker network)
    # Browser calls /request → nginx forwards to http://rate-limiter:4000/request
    location ~ ^/(request|burst|reset|health) {
        proxy_pass         http://rate-limiter:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Serve React app — all unknown paths fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}

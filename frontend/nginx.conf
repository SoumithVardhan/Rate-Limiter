server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver injected at container startup from /etc/resolv.conf.
    # This works on any platform (Railway, Kubernetes, AWS ECS, Docker Compose)
    # because we read the actual system nameserver instead of hardcoding one.
    # valid=30s forces nginx to re-resolve the upstream hostname every 30 seconds
    # so a redeployed service with a new IP is picked up automatically.
    # ipv6=off avoids issues with Railway's IPv6 internal addresses.
    resolver ${DNS_RESOLVER} valid=30s ipv6=off;

    # Proxy API calls to the rate-limiter service.
    # RATE_LIMITER_URL is injected at container start via envsubst.
    # Using a variable ($upstream) instead of a literal URL forces nginx
    # to use the resolver above — without this, nginx ignores the resolver.
    location ~ ^/(request|burst|reset|health) {
        set $upstream ${RATE_LIMITER_URL};

        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Fail fast — don't let the browser hang for 35+ seconds
        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    15s;
    }

    # Serve React app — all unknown paths fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
